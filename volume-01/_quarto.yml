project:
  type: book
  output-dir: _book
  render:
    - index.md
    - chapters/*.md
    - appendix-g-handbook-navigation.md
    - appendix-j-investigator-minimum-path.md
    - appendix-k-in-the-room-stories.md
    - appendix-h-clinicians-route.md
    - appendix-i-figure-hygiene.md
    - appendix-b-quick-reference.md
    - appendix-a-r-setup.md
    - appendix-c-glossary.md
    - appendix-d-missing-data-checklists.md
    - appendix-f-exercises.md
    - appendix-l-omics-analyst-track.md
    - appendix-m-bioinformatics-deliverables.md
    - appendix-n-bulk-vs-singlecell.md
    - appendix-o-ch04-comparison-extensions.md
    - references.qmd

filters:
  - filters/remove_hr.lua

github-repo: https://github.com/kimonntotsis/Breathing-Room-for-Statistics
github-repo-base: https://github.com/kimonntotsis/Breathing-Room-for-Statistics/tree/main

book:
  title: "Breathing Room for Statistics"
  subtitle: "A statistical handbook for respiratory research: from trials to omics and prediction"
  author: "Kimon Ntotsis"
  date: today
  cover-image: figures/book-cover-pearl-streams.png
  cover-image-alt: "Stylized lungs formed from statistical plots, formulas, and data streams on a dark pearl-grey background."
  chapters:
    - index.md
    - chapters/00-edition.md
    - chapters/00-preface.md
    - chapters/00-welcome.md
    - parts/part-01-foundations.md
    - chapters/01-statistical-thinking.md
    - chapters/02-respiratory-data.md
    - parts/part-02-describe-compare.md
    - chapters/03-descriptive-analysis.md
    - chapters/04-comparing-groups.md
    - parts/part-03-regression.md
    - chapters/05-linear-models.md
    - chapters/06-generalized-linear-models.md
    - chapters/07-model-building.md
    - parts/part-04-validation-prediction.md
    - chapters/08-validation-reporting.md
    - chapters/09-prediction-vs-inference.md
    - parts/part-05-discovery.md
    - chapters/10-dimensionality-reduction.md
    - chapters/11-clustering.md
    - chapters/12-case-studies.md
    - parts/part-06-highdim-biology.md
    - chapters/13-differential-analysis-fdr.md
    - chapters/14-batch-effects.md
    - chapters/15-flow-cytometry.md
    - chapters/16-antibody-discovery.md
    - parts/part-07-capstone.md
    - chapters/17-integrated-castor-hd.md
    - parts/part-08-longitudinal-survival.md
    - chapters/18-longitudinal-mixed-models.md
    - chapters/19-survival-analysis.md
    - chapters/20-missing-data.md
    - chapters/21-causal-inference.md
    - chapters/22-mediation-analysis.md
    - appendix-g-handbook-navigation.md
    - appendix-j-investigator-minimum-path.md
    - appendix-k-in-the-room-stories.md
    - appendix-h-clinicians-route.md
    - appendix-i-figure-hygiene.md
    - appendix-b-quick-reference.md
    - appendix-a-r-setup.md
    - appendix-c-glossary.md
    - appendix-d-missing-data-checklists.md
    - appendix-f-exercises.md
    - appendix-l-omics-analyst-track.md
    - appendix-m-bioinformatics-deliverables.md
    - appendix-n-bulk-vs-singlecell.md
    - appendix-o-ch04-comparison-extensions.md
    - references.qmd

bibliography: ../references.bib
csl: apa.csl
link-citations: true
reference-section-title: References

format:
  html:
    theme: cosmo
    toc: true
    number-sections: true
    citeproc: true
    cover-image: figures/book-cover-pearl-streams.png
  pdf:
    filters:
      - filters/remove_hr.lua
      - filters/widen_label_tables.lua
      - filters/fix_data_tables.lua
      - filters/github_pdf_links.lua
    documentclass: scrreprt
    papersize: a4
    geometry:
      - margin=2.5cm
    toc: true
    number-sections: true
    colorlinks: true
    citeproc: true
    code-overflow: wrap
    template-partials:
      - latex/before-body.tex
    include-before-body:
      text: |
        \input{latex/cover-page.tex}
    include-in-header:
      text: |
        \usepackage{amsmath}
        \usepackage{amssymb}
        \usepackage{graphicx}
        \usepackage{xcolor}
        \usepackage{tikz}
        \usetikzlibrary{calc}
        \usepackage{float}
        \usepackage{booktabs}
        \usepackage{longtable}
        \usepackage{array}
        \usepackage{tabularx}
        \usepackage{calc}
        \input{latex/pdf-preamble.tex}
    fig-pos: 'H'

execute:
  eval: false
  echo: true
  warning: false
  message: false
