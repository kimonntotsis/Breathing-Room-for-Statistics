name: Handbook PDF

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:
    inputs:
      include_omics:
        description: "Run Bioconductor omics examples (Appendix L)"
        required: false
        default: "false"
        type: choice
        options:
          - "false"
          - "true"

jobs:
  verify-figures:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Verify figure markdown
        run: python3 volume-01/scripts/verify_figure_markdown.py
      - name: Verify committed outputs match prose
        run: python3 volume-01/scripts/verify_committed_outputs.py

  run-core-r-examples:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: r-lib/actions/setup-r@v2
        with:
          r-version: "release"
      - uses: r-lib/actions/setup-renv@v2
        with:
          cache-version: 1
      - name: Restore renv library
        run: Rscript -e 'renv::restore()'
      - name: Run core R examples and regenerate data
        run: |
          Rscript -e 'source("R/run_all_examples.R"); run_all_examples(include_omics = FALSE)'

  run-omics-examples:
    if: github.event_name == 'workflow_dispatch' && github.event.inputs.include_omics == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: r-lib/actions/setup-r@v2
        with:
          r-version: "release"
      - uses: r-lib/actions/setup-renv@v2
        with:
          cache-version: 1
      - name: Restore renv library
        run: Rscript -e 'renv::restore()'
      - name: Install Bioconductor packages
        run: |
          Rscript -e 'if (!requireNamespace("BiocManager", quietly = TRUE)) install.packages("BiocManager"); BiocManager::install(c("DESeq2", "limma", "edgeR", "fgsea", "sva"), ask = FALSE, update = FALSE)'
      - name: Run omics analyst examples (Appendix L)
        run: |
          Rscript -e 'source("R/run_all_examples.R"); run_all_examples(include_omics = TRUE)'

  build-pdf:
    runs-on: ubuntu-latest
    needs: [verify-figures, run-core-r-examples]
    steps:
      - uses: actions/checkout@v4
      - uses: quarto-dev/quarto-actions/setup@v2
      - name: Install TinyTeX
        uses: r-lib/actions/setup-tinytex@v2
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Build handbook PDF
        run: ./build-handbook-pdf.sh
      - name: Verify PDF build
        run: |
          pip install pypdf
          python3 volume-01/scripts/verify_pdf_build.py
      - name: Upload PDF artifact
        uses: actions/upload-artifact@v4
        with:
          name: Breathing-Room-for-Statistics
          path: Breathing-Room-for-Statistics.pdf
          if-no-files-found: error
